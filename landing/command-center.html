<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RIJEKA — Command Center</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300&display=swap" rel="stylesheet">
<style>
:root {
  --bg:         #060a0e;
  --bg-deep:    #03060a;
  --panel:      #0b1219;
  --border:     #192433;
  --border-hi:  #213040;
  --text:       #7da8c0;
  --text-hi:    #b8d8e8;
  --text-dim:   #344e62;
  --text-mute:  #1a2e3e;
  --accent:     #0ec9a0;
  --accent-dim: #097a61;
  --amber:      #e8a020;
  --amber-dim:  #8a5010;
  --blue:       #3d8bc8;
  --purple:     #9060cc;
  --red:        #d95040;
  --mono: 'JetBrains Mono', monospace;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; background: #000; }
body { font-family: var(--mono); cursor: crosshair; }
::selection { background: rgba(14,201,160,.2); color: var(--accent); }
::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-track { background: var(--bg-deep); }
::-webkit-scrollbar-thumb { background: var(--border-hi); }

/* ── MATRIX CANVAS ── */
#matrix-canvas {
  position: fixed; inset: 0; z-index: 0;
  pointer-events: none;
}

/* ── BOOT ── */
#boot {
  position: fixed; inset: 0; z-index: 100;
  display: flex; align-items: center; justify-content: center;
  transition: opacity 1.2s ease;
}
#boot.fade-out { opacity: 0; pointer-events: none; }

.boot-inner { width: 520px; max-width: 90vw; position: relative; z-index: 2; }

.boot-logo {
  font-size: 11px; font-weight: 700; letter-spacing: 6px;
  color: rgba(255,255,255,.15); margin-bottom: 28px;
  opacity: 0; animation: bFade .5s .3s ease forwards;
}
.boot-logo em { color: var(--accent); font-style: normal; }

.boot-rule {
  height: 1px;
  background: linear-gradient(90deg, var(--accent-dim), transparent);
  margin-bottom: 18px;
  opacity: 0; animation: bFade .4s .6s ease forwards;
}

.boot-lines { display: flex; flex-direction: column; }

.boot-line {
  display: flex; justify-content: space-between; align-items: center;
  font-size: 10px; line-height: 2.4;
  opacity: 0; transform: translateX(-6px);
  transition: opacity .2s ease, transform .2s ease;
}
.boot-line.show { opacity: 1; transform: none; }

.bl-key { color: var(--text-dim); letter-spacing: .3px; }
.bl-sep { flex: 1; border-bottom: 1px dotted var(--text-mute); margin: 0 12px 3px; opacity: .3; }
.bl-val { color: var(--text); text-align: right; }
.bl-val.ok   { color: var(--accent); }
.bl-val.warn { color: var(--amber); }

.boot-welcome {
  margin-top: 22px; font-size: 11px; font-weight: 500;
  letter-spacing: 3px; text-transform: uppercase;
  color: var(--accent); text-align: center;
  opacity: 0; transition: opacity .6s ease;
}
.boot-welcome.show { opacity: 1; }

.boot-cursor {
  display: inline-block; width: 7px; height: 12px;
  background: var(--accent); vertical-align: middle; margin-left: 4px;
  animation: blink 1s step-end infinite;
}

/* ── APP ── */
#app {
  position: fixed; inset: 0; z-index: 10;
  display: flex; flex-direction: column;
  opacity: 0; pointer-events: none;
  transition: opacity .8s ease;
}
#app.visible { opacity: 1; pointer-events: all; }

/* ── TOP BAR ── */
#topbar {
  height: 44px; flex-shrink: 0;
  background: rgba(3,6,10,.78);
  border-bottom: 1px solid rgba(25,36,51,.7);
  backdrop-filter: blur(20px);
  display: flex; align-items: center;
  padding: 0 28px;
}

.brand {
  font-size: 12px; font-weight: 700; letter-spacing: 5px;
  color: rgba(184,216,232,.85); cursor: pointer; user-select: none;
  transition: color .2s;
}
.brand em { color: var(--accent); font-style: normal; }
.brand:hover { color: #fff; }

.topbar-right {
  margin-left: auto; display: flex; align-items: center; gap: 22px;
  font-size: 9px; letter-spacing: .5px;
}
.tr-item { color: var(--text-dim); }
.tr-item strong { color: var(--text); font-weight: 500; }
.tr-item.hi strong { color: var(--accent); }

.tr-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--accent);
  animation: dotPulse 2.5s ease-in-out infinite;
}

/* ── MAIN ── */
#main {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 24px 32px 20px;
  gap: 24px; min-height: 0;
}

.cc-eye {
  font-size: 8px; letter-spacing: 4px; text-transform: uppercase;
  color: rgba(14,201,160,.35); text-align: center;
  opacity: 0; animation: riseIn .5s .1s ease forwards;
}

/* ── MODULE GRID ── */
.mod-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 1px;
  background: rgba(25,36,51,.4);
  border: 1px solid rgba(25,36,51,.5);
  width: 100%; max-width: 1100px;
  backdrop-filter: blur(4px);
}

.mod {
  position: relative;
  background: rgba(6,10,14,.7);
  padding: 26px 24px 22px;
  cursor: pointer; overflow: hidden;
  display: flex; flex-direction: column; gap: 10px;
  transition: background .25s;
  opacity: 0;
}
.mod.reveal { animation: modIn .45s ease forwards; }
.mod:nth-child(1){animation-delay:.04s}
.mod:nth-child(2){animation-delay:.09s}
.mod:nth-child(3){animation-delay:.14s}
.mod:nth-child(4){animation-delay:.19s}
.mod:nth-child(5){animation-delay:.24s}
.mod:nth-child(6){animation-delay:.29s}
.mod:nth-child(7){animation-delay:.34s}
.mod:nth-child(8){animation-delay:.39s}

.mod:hover { background: rgba(11,18,25,.9); }

.mod::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 1px;
  background: var(--mc, var(--accent));
  transform: scaleX(0); transform-origin: left;
  transition: transform .35s ease;
}
.mod:hover::before { transform: scaleX(1); }

.mod.locked { cursor: default; }
.mod.locked::after {
  content: '';
  position: absolute; inset: 0;
  background: rgba(6,10,14,.45);
  pointer-events: none;
}
.mod.locked:hover { background: rgba(6,10,14,.7); }
.mod.locked:hover::before { transform: scaleX(0); }

.mod-tag {
  font-size: 8.5px; font-weight: 700; letter-spacing: 2.5px;
  text-transform: uppercase;
  color: var(--mc, var(--accent));
}
.mod.locked .mod-tag { opacity: .3; }

.mod-label {
  font-size: 16px; font-weight: 700; letter-spacing: -.3px;
  color: rgba(184,216,232,.82); line-height: 1.1;
  transition: color .2s;
}
.mod:hover .mod-label { color: #fff; }
.mod.locked .mod-label { color: rgba(184,216,232,.18); }

.mod-desc {
  font-size: 8.5px; color: var(--text-dim); line-height: 1.7;
  transition: color .2s;
}
.mod:hover .mod-desc { color: var(--text); }
.mod.locked .mod-desc { opacity: .25; }

.mod-badge {
  display: inline-flex; align-items: center;
  font-size: 7.5px; font-weight: 600; letter-spacing: 1px;
  text-transform: uppercase; padding: 2px 8px;
  border-radius: 2px; border: 1px solid;
  align-self: flex-start; margin-top: 6px;
}
.mb-live   { border-color: var(--accent-dim); color: var(--accent);   background: rgba(14,201,160,.07); }
.mb-active { border-color: var(--amber-dim);  color: var(--amber);    background: rgba(232,160,32,.07); animation: ambPulse 2s infinite; }
.mb-next   { border-color: var(--border-hi);  color: var(--text-dim); background: transparent; opacity: .5; }

/* ── STATUS BAR ── */
#statusbar {
  height: 28px; flex-shrink: 0;
  background: rgba(3,6,10,.82);
  border-top: 1px solid rgba(25,36,51,.6);
  backdrop-filter: blur(12px);
  display: flex; align-items: center;
  padding: 0 20px; gap: 20px;
  font-size: 8.5px; color: var(--text-mute);
  opacity: 0; animation: riseIn .4s .7s ease forwards;
}
.sb-i strong { color: var(--text-dim); font-weight: 500; }
.sb-i.ok strong { color: var(--accent); }
#sb-clock { margin-left: auto; font-size: 8px; letter-spacing: .5px; }

/* ── FLASH ── */
#flash {
  position: fixed; inset: 0; z-index: 200;
  pointer-events: none; opacity: 0;
  transition: opacity .15s ease;
}

/* ── ANIMATIONS ── */
@keyframes bFade  { from{opacity:0}    to{opacity:1} }
@keyframes blink  { 50%{opacity:0} }
@keyframes riseIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:none} }
@keyframes modIn  { from{opacity:0;transform:translateY(10px) scale(.98)} to{opacity:1;transform:scale(1)} }
@keyframes dotPulse {
  0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(14,201,160,.5)}
  50%{opacity:.6;box-shadow:0 0 0 5px rgba(14,201,160,0)}
}
@keyframes ambPulse { 0%,100%{opacity:1} 50%{opacity:.55} }

@media (max-width: 860px) {
  .mod-grid { grid-template-columns: repeat(2,1fr); }
  .mod-label { font-size: 14px; }
  #main { padding: 12px 14px 14px; }
}
</style>
</head>
<body>

<canvas id="matrix-canvas"></canvas>

<!-- BOOT -->
<div id="boot">
  <div class="boot-inner">
    <div class="boot-logo">RI<em>JE</em>KA &nbsp;·&nbsp; RISK SYSTEM &nbsp;·&nbsp; v2.0</div>
    <div class="boot-rule"></div>
    <div class="boot-lines" id="boot-lines"></div>
    <div class="boot-welcome" id="boot-welcome">
      Welcome to the river. <span class="boot-cursor"></span>
    </div>
  </div>
</div>

<div id="flash"></div>

<!-- APP -->
<div id="app">
  <div id="topbar">
    <div class="brand" onclick="goHome()">RI<em>JE</em>KA</div>
    <div class="topbar-right">
      <div class="tr-item hi">Trader: <strong id="meta-id">MIKO.DEVEDZIC</strong></div>
      <div class="tr-item">Role: <strong>READ_ONLY</strong></div>
      <div class="tr-item">Curves: <strong style="color:var(--accent)">54</strong></div>
      <div class="tr-dot"></div>
    </div>
  </div>

  <div id="main">
    <div class="cc-eye">Command Center &nbsp;·&nbsp; <span id="cc-date"></span></div>
    <div class="mod-grid" id="mod-grid"></div>
  </div>

  <div id="statusbar">
    <div class="sb-i ok">OIS <strong>13</strong></div>
    <div class="sb-i ok">Basis <strong>22</strong></div>
    <div class="sb-i ok">XCCY <strong>12</strong></div>
    <div class="sb-i ok">Funding <strong>7</strong></div>
    <div class="sb-i">QuantLib <strong>1.34</strong></div>
    <div class="sb-i">ISDA SIMM <strong>v2.6</strong></div>
    <div id="sb-clock"></div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════════════
//  MATRIX RAIN — math symbols + formula fragments
// ══════════════════════════════════════════════════════
const GLYPHS = [
  // Greek
  'α','β','γ','δ','ε','ζ','η','θ','λ','μ','ν','ξ','π','ρ','σ','τ','φ','χ','ψ','ω',
  'Γ','Δ','Θ','Λ','Π','Σ','Φ','Ψ','Ω',
  // Math
  '∂','∫','∑','∏','√','∞','≈','≠','≤','≥','∈','∇','±',
  // Formula atoms — feel financial/quantitative
  'dS','dt','σW','rT','E[','λt','D(t','K_b','ρij','s_i',
  'N(d₁','e^r','CVA','DVA','FVA','MVA','PFE','EE(',
  'VaR','ES_α','SIMM','OIS','SOFR','€STR',
  'P(0,T)','f(0,t)','1-R',
  // SABR / vol surface atoms
  'σ_ATM','β=.5','ν=.3','ρ=-.2','α(T)','F_0','SABR',
  // Financial numbers
  '4.480','3.780','-25bp','+12bp','1e-12','0.9997',
];

const canvas = document.getElementById('matrix-canvas');
const ctx    = canvas.getContext('2d');
const FS     = 13;  // font size px
let W, H, drops;

function initMatrix() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
  const cols = Math.floor(W / (FS * 1.5));

  drops = Array.from({ length: cols }, () => ({
    y:      Math.random() * -(H / FS),
    speed:  0.22 + Math.random() * 0.52,
    glyph:  pick(GLYPHS),
    timer:  rnd(4, 16),
    bright: Math.random() > 0.85,   // occasional brighter column
  }));
}

function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
function rnd(a,b)  { return a + Math.random() * (b - a); }

let lt = 0;
function drawMatrix(ts) {
  const dt = Math.min((ts - lt) / 16.67, 3);
  lt = ts;

  // Fade — controls trail length
  ctx.fillStyle = 'rgba(6,10,14,.16)';
  ctx.fillRect(0, 0, W, H);

  ctx.font = `${FS}px 'JetBrains Mono', monospace`;
  ctx.textAlign = 'left';

  drops.forEach((d, i) => {
    const x = i * FS * 1.5;
    const y = d.y * FS;

    // Lead char — bright white-green
    ctx.fillStyle = d.bright ? '#e0fff8' : '#c8f0e4';
    ctx.fillText(d.glyph, x, y);

    // Advance
    d.y += d.speed * dt;

    // Refresh glyph
    d.timer -= dt;
    if (d.timer <= 0) {
      d.glyph = pick(GLYPHS);
      d.timer = rnd(3, 14);
    }

    // Reset
    if (y > H + FS * 3) {
      d.y     = rnd(-20, -2);
      d.speed = 0.22 + Math.random() * 0.52;
      d.bright = Math.random() > 0.85;
    }
  });

  requestAnimationFrame(drawMatrix);
}

window.addEventListener('resize', initMatrix);
initMatrix();
requestAnimationFrame(drawMatrix);


// ══════════════════════════════════════════════════════
//  BOOT SEQUENCE
// ══════════════════════════════════════════════════════
const TRADER_ID = 'MIKO.DEVEDZIC';

const BOOT_ROWS = [
  { key: 'System',           val: 'RIJEKA RISK v2.0',   cls: 'ok'   },
  { key: 'Authenticating',   val: TRADER_ID,             cls: 'ok'   },
  { key: 'Curve universe',   val: '54 instruments',      cls: 'ok'   },
  { key: 'OIS bootstrap',    val: '13 passed',           cls: 'ok'   },
  { key: 'Basis curves',     val: '22 passed',           cls: 'ok'   },
  { key: 'XCCY basis',       val: '12 passed',           cls: 'ok'   },
  { key: 'Funding spreads',  val: '7 loaded',            cls: 'ok'   },
  { key: 'QuantLib engine',  val: 'v1.34 online',        cls: 'ok'   },
  { key: 'ISDA SIMM',        val: 'v2.6 schema loaded',  cls: 'ok'   },
  { key: 'Role assigned',    val: 'READ_ONLY',           cls: 'warn' },
  { key: 'Session',          val: 'established',         cls: 'ok'   },
];

function playSound() {
  try {
    const ac = new (window.AudioContext || window.webkitAudioContext)();
    const t  = ac.currentTime;
    const tone = (f, s, dur, v, type='sine') => {
      const o = ac.createOscillator(), g = ac.createGain();
      o.connect(g); g.connect(ac.destination);
      o.type = type; o.frequency.value = f;
      g.gain.setValueAtTime(0, t+s);
      g.gain.linearRampToValueAtTime(v, t+s+.09);
      g.gain.exponentialRampToValueAtTime(.0001, t+s+dur);
      o.start(t+s); o.stop(t+s+dur+.12);
    };
    tone(40,  0.0, 3.0, .10);
    tone(80,  0.0, 2.8, .07);
    tone(160, 0.5, 2.2, .05, 'triangle');
    tone(240, 0.8, 1.8, .04);
    tone(320, 1.1, 1.4, .03);
    tone(640, 1.4, 1.0, .015);
    // Resolution — D maj
    tone(146.8, 2.1, 1.8, .06);
    tone(220.0, 2.1, 1.8, .04);
    tone(293.7, 2.1, 1.8, .03);
    tone(440.0, 2.1, 1.4, .02);
  } catch(e) {}
}

function runBoot() {
  playSound();

  const container = document.getElementById('boot-lines');
  const welcome   = document.getElementById('boot-welcome');

  BOOT_ROWS.forEach((row, i) => {
    const el = document.createElement('div');
    el.className = 'boot-line';
    el.innerHTML = `
      <span class="bl-key">${row.key}</span>
      <span class="bl-sep"></span>
      <span class="bl-val ${row.cls}">${row.val}</span>
    `;
    container.appendChild(el);
    setTimeout(() => el.classList.add('show'), 280 + i * 165);
  });

  const readyAt = 280 + BOOT_ROWS.length * 165 + 160;
  setTimeout(() => welcome.classList.add('show'), readyAt);

  setTimeout(() => {
    // Green flash
    const fl = document.getElementById('flash');
    fl.style.cssText = 'background:rgba(14,201,160,.10);opacity:0;transition:opacity .12s ease';
    requestAnimationFrame(() => { fl.style.opacity = '1'; });
    setTimeout(() => { fl.style.opacity = '0'; }, 180);

    // Reveal app
    document.getElementById('boot').classList.add('fade-out');
    document.getElementById('app').classList.add('visible');
    document.querySelectorAll('.mod').forEach(m => m.classList.add('reveal'));

    setTimeout(() => {
      document.getElementById('boot').style.display = 'none';
    }, 1400);
  }, readyAt + 1300);
}


// ══════════════════════════════════════════════════════
//  MODULE DEFINITIONS
// ══════════════════════════════════════════════════════
const MODS = [
  {
    tag: 'Market Data',
    label: 'Curves & Surfaces',
    desc: 'OIS · Basis · XCCY · Funding · Vol surfaces · Fixings · Snap workflow',
    badge: 'Sprint 2 Active', badgeCls: 'mb-active',
    color: '#0ec9a0', locked: false, href: '/config/market-data/curves',
  },
  {
    tag: 'Pricer',
    label: 'Full Revaluation',
    desc: 'IRS · Swaption · FX Forward · XCCY Swap · CDS · Full Greeks',
    badge: 'Sprint 5', badgeCls: 'mb-next',
    color: '#e8a020', locked: true,
  },
  {
    tag: 'Market Risk',
    label: 'VaR / ES / FRTB',
    desc: 'Full revaluation VaR · Expected Shortfall · Stress · PnL explain',
    badge: 'Sprint 7', badgeCls: 'mb-next',
    color: '#3d8bc8', locked: true,
  },
  {
    tag: 'CCR / XVA',
    label: 'CVA · FVA · MVA',
    desc: 'EE · PFE · CVA · DVA · FVA · ColVA · MVA · netting sets',
    badge: 'Sprint 9', badgeCls: 'mb-next',
    color: '#9060cc', locked: true,
  },
  {
    tag: 'ISDA SIMM',
    label: 'v2.6 Full Engine',
    desc: 'Delta · Vega · Curvature · Base Corr · CRIF · 6 risk classes',
    badge: 'Sprint 11', badgeCls: 'mb-next',
    color: '#d95040', locked: true,
  },
  {
    tag: 'PnL',
    label: 'P&L Attribution',
    desc: 'Daily PnL · Greeks decomposition · Theta · Unexplained · Backtesting',
    badge: 'Sprint 7', badgeCls: 'mb-next',
    color: '#1dc87a', locked: true,
  },
  {
    tag: 'Blockchain',
    label: 'On-Chain Confirm',
    desc: 'Ethereum · ISDA CDM events · Wallet-signed · Immutable audit trail',
    badge: 'Sprint 16', badgeCls: 'mb-next',
    color: '#20c0c8', locked: true,
  },
  {
    tag: 'Config',
    label: 'Org & Entities',
    desc: 'Org hierarchy · Legal entities · Counterparties · RBAC · Onboarding',
    badge: 'Live', badgeCls: 'mb-live',
    color: '#0ec9a0', locked: false, href: '/config',
  },
];

function buildMods() {
  const grid = document.getElementById('mod-grid');
  MODS.forEach(m => {
    const el = document.createElement('div');
    el.className = 'mod' + (m.locked ? ' locked' : '');
    el.style.setProperty('--mc', m.color);
    el.innerHTML = `
      <div class="mod-tag">${m.tag}</div>
      <div class="mod-label">${m.label}</div>
      <div class="mod-desc">${m.desc}</div>
      <div class="mod-badge ${m.badgeCls}">${m.badge}</div>
    `;
    if (!m.locked) {
      el.addEventListener('click', () => {
        const fl = document.getElementById('flash');
        fl.style.cssText = `background:${m.color};opacity:0;transition:opacity .12s ease`;
        requestAnimationFrame(() => { fl.style.opacity = '.14'; });
        setTimeout(() => { fl.style.opacity = '0'; }, 160);
        // production: window.location.href = m.href;
      });
    }
    grid.appendChild(el);
  });
}

function goHome() {
  document.querySelectorAll('.mod').forEach((el, i) => {
    el.style.opacity = '0';
    el.style.transition = 'opacity .25s ease';
    setTimeout(() => { el.style.opacity = '1'; }, 50 + i * 30);
  });
}

// ── Clock ──
function tick() {
  const now = new Date(), p = n => String(n).padStart(2,'0');
  document.getElementById('sb-clock').textContent =
    `${p(now.getHours())}:${p(now.getMinutes())}:${p(now.getSeconds())} UTC`;
  document.getElementById('cc-date').textContent =
    now.toLocaleDateString('en-GB',{weekday:'short',day:'2-digit',month:'short',year:'numeric'}).toUpperCase();
}

// ── Init ──
buildMods();
tick();
setInterval(tick, 1000);
window.addEventListener('load', () => setTimeout(runBoot, 200));
</script>
